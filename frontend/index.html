<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Budget Tracker</h1>
    
    <!-- Transaktion hinzufügen -->
    <section id="add-transaction">
        <h2>Transaktion hinzufügen</h2>
        <!-- Formular kommt hier rein -->
         <form action="/transactions" method="post">
            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" step="0.01">

            <label for="type">Type:</label>
            <select name="type" id="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <label for="category">Category:</label>
            <input type="text" id="category" name="category">

            <label for="description">Description:</label>
            <input type="text" id="description" name="description">

            <label for="date">Date:</label>
            <input type="date" id="date" name="date">

            <button type="submit">Hinzufügen</button>
        </form>

    </section>

    <!-- Transaktionen anzeigen -->
    <section id="transactions">
        <h2>Transaktionen</h2>
        <table id="transaction-table">
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Typ</th>
                    <th>Kategorie</th>
                    <th>Betrag</th>
                    <th>Beschreibung</th>
                    <th>Aktion</th>  
                </tr>
            </thead>
            <tbody id="transaction-body">
            </tbody>
        </table>
    </section>

    <!--Transaction Summary-->
    <section>
        <h2>Übersicht Transaktionen</h2>
        <p>Einnahmen: <span id="summary-income"></span></p>
        <p>Ausgaben: <span id="summary-expenses"></span></p>
        <p>Saldo: <span id="summary-balance"></span></p>
    </section>

    <!-- Budget-Ziele -->
    <section id="budget-goals">
        <h2>Budget-Ziele</h2>
        
        <!-- Formular -->
        <form id="budget-goal-form">
            <!-- Felder: category (text), limit (number) -->
            <label for="category">Category:</label>
            <input type="text" id="category" name="category">

            <label for="limit">Limit:</label>
            <input type="number" id="limit" name="limit" step="0.01">

            <button type="submit">Hinzufügen</button>
        </form>

        <!-- Tabelle -->
        <table id="budget-goal-table">
            <thead>
                <tr>
                    <th>Kategorie</th>
                    <th>Limit</th>
                    <th>Aktion</th>
                </tr>
            </thead>
            <tbody id="budget-goal-body">
            </tbody>
        </table>
    </section>

    <!--Budget Summary-->
    <section id="budget-summary">
        <h2>Übersicht Budget</h2>
        <table id="bugdget-summary-table">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Limit</th>
                    <th>Spent</th>
                    <th>Remaining</th>
                </tr>
            </thead>
            <tbody id="budget-summary-body">
            </tbody>
        </table>
    </section>

    <script src="/static/app.js"></script>
</body>
</html>
