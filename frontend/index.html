<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Budget Tracker</h1>

    <!-- Metric Cards -->
    <div class="metric-grid">
        <div class="metric">
            <div class="metric-label">Einnahmen</div>
            <div class="metric-value income" id="summary-income">—</div>
        </div>
        <div class="metric">
            <div class="metric-label">Ausgaben</div>
            <div class="metric-value expense" id="summary-expenses">—</div>
        </div>
        <div class="metric">
            <div class="metric-label">Saldo</div>
            <div class="metric-value" id="summary-balance">—</div>
        </div>
    </div>

    <!-- Transaktion hinzufügen -->
    <div class="card">
        <h2>Transaktion hinzufügen</h2>
        <form id="transaction-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="amount">Betrag</label>
                    <input type="number" id="amount" name="amount" step="0.01">
                </div>
                <div class="form-group">
                    <label for="type">Typ</label>
                    <select name="type" id="type">
                        <option value="income">Einnahme</option>
                        <option value="expense">Ausgabe</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Kategorie</label>
                    <input type="text" id="category" name="category">
                </div>
                <div class="form-group">
                    <label for="date">Datum</label>
                    <input type="date" id="date" name="date">
                </div>
                <div class="form-group full">
                    <label for="description">Beschreibung</label>
                    <input type="text" id="description" name="description">
                </div>
            </div>
            <button type="submit">Hinzufügen</button>
        </form>
    </div>

    <!-- Transaktionen -->
    <div class="card">
        <h2>Transaktionen</h2>
        <table id="transaction-table">
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Kategorie</th>
                    <th>Beschreibung</th>
                    <th>Typ</th>
                    <th>Betrag</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="transaction-body"></tbody>
        </table>
    </div>

    <!-- Budget-Ziele -->
    <div class="card">
        <h2>Budget-Ziele</h2>
        <form id="budget-goal-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="bg-category">Kategorie</label>
                    <input type="text" id="bg-category" name="category">
                </div>
                <div class="form-group">
                    <label for="limit">Limit</label>
                    <input type="number" id="limit" name="limit" step="0.01">
                </div>
            </div>
            <button type="submit">Hinzufügen</button>
        </form>
        <div id="budget-goal-body" style="margin-top: 1rem;"></div>
    </div>

    <!-- Budget Übersicht -->
    <div class="card">
        <h2>Budget Übersicht</h2>
        <div id="budget-summary-body"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
